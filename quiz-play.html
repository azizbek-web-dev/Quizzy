<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Science &amp; Technology Quiz — Quizzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/design-tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/dashboard/dashboard-tokens.css" />
    <link rel="stylesheet" href="css/quiz-play/quiz-play.css" />
  </head>
  <body>
    <div class="qp-page">
      <header class="qp-header">
        <a class="qp-back" href="quiz-detail.html" aria-label="Orqaga">
          <img src="assets/icons/material-symbols_chevron-left-rounded.svg" alt="" width="20" height="20" />
        </a>
        <h1 class="qp-title">Science &amp; Technology Quiz</h1>
        <span class="qp-header-spacer" aria-hidden="true"></span>
      </header>

      <div class="qp-body">
        <main class="qp-main">
          <div class="qp-progress-block">
            <div class="qp-progress-labels">
              <span><strong>Question 1</strong> of 10</span>
              <span><strong>10%</strong> Complete</span>
            </div>
            <div class="qp-progress-bar" role="progressbar" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100">
              <div class="qp-progress-bar__fill" style="width: 10%"></div>
            </div>
          </div>

          <article class="qp-card">
            <div class="qp-card__meta">
              <span class="qp-badge qp-badge--points">100 points</span>
              <span class="qp-timer" aria-live="polite">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" stroke="#ef4444" stroke-width="2" />
                  <path d="M12 7v5l3 2" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
                </svg>
                00:00
              </span>
              <span class="qp-badge qp-badge--difficulty">Medium</span>
            </div>

            <p class="qp-question">
              Which of the following energy sources cannot be replenished naturally on a human timescale, making it an
              example of a non-renewable resource?
            </p>

            <div class="qp-answers" role="group" aria-label="Javob variantlari">
              <button type="button" class="qp-option" data-qp-option>
                <span class="qp-option__letter">A</span>
                Solar Power
              </button>
              <button type="button" class="qp-option" data-qp-option>
                <span class="qp-option__letter">B</span>
                Wind Power
              </button>
              <button type="button" class="qp-option" data-qp-option>
                <span class="qp-option__letter">C</span>
                Natural Gas
              </button>
              <button type="button" class="qp-option" data-qp-option>
                <span class="qp-option__letter">D</span>
                Hydroelectric Power
              </button>
            </div>

            <div class="qp-actions">
              <button type="button" class="qp-btn-skip">
                <img src="assets/icons/ic_flag-outline.svg" alt="" width="18" height="18" />
                Skip
              </button>
              <button type="button" class="qp-btn-next">
                Next Question
                <img src="assets/icons/material-symbols_chevron-right-rounded.svg" alt="" width="18" height="18" />
              </button>
            </div>
          </article>
        </main>

        <aside class="qp-stats" aria-label="Quiz statistikasi">
          <h2 class="qp-stats__title">Quiz Stats</h2>
          <div class="qp-stats__grid">
            <div class="qp-stat">
              <span class="qp-stat__label">Score</span>
              <span class="qp-stat__value">0</span>
            </div>
            <div class="qp-stat">
              <span class="qp-stat__label">Lives</span>
              <div class="qp-stat__hearts" aria-label="3 ta jon">
                <img src="assets/icons/ic_heart.svg" alt="" width="22" height="22" />
                <img src="assets/icons/ic_heart.svg" alt="" width="22" height="22" />
                <img src="assets/icons/ic_heart.svg" alt="" width="22" height="22" />
              </div>
            </div>
            <div class="qp-stat">
              <span class="qp-stat__label">Progress</span>
              <span class="qp-stat__value qp-stat__value--muted">1/10</span>
            </div>
            <div class="qp-stat">
              <span class="qp-stat__label">Position</span>
              <span class="qp-stat__value">2nd</span>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script>
      (function () {
        document.querySelectorAll("[data-qp-option]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.querySelectorAll("[data-qp-option]").forEach(function (b) {
              b.classList.remove("qp-option--selected");
            });
            btn.classList.add("qp-option--selected");
          });
        });
      })();
    </script>
  </body>
</html>
