<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Kirish — Quizzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/design-tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages/register.css" />
  </head>
  <body>
    <div class="register-page" id="sign-in">
      <aside class="register-brand" aria-label="Quizzy">
        <div class="register-brand__patterns" aria-hidden="true">
          <div class="register-brand__pattern register-brand__pattern--top"></div>
          <div class="register-brand__pattern register-brand__pattern--bottom"></div>
        </div>
        <div class="register-brand__glow" aria-hidden="true"></div>
        <a class="register-brand__logo" href="index.html">Quizzy</a>
      </aside>
      <div class="register-panel">
        <a class="register-panel__mobile-brand" href="index.html">Quizzy</a>
        <div class="register-form-wrap">
          <h1 class="register-form__title">Welcome back</h1>
          <p class="register-form__lead">Enter your credentials to access your account</p>

          <form class="register-form" action="#" method="post" novalidate>
            <div class="register-social">
              <a class="register-social__btn" href="#" aria-label="Google orqali kirish">
                <img src="assets/icons/devicon_google.svg" alt="" width="20" height="20" />
                Google
              </a>
              <a class="register-social__btn" href="#" aria-label="Facebook orqali kirish">
                <img src="assets/icons/logos_facebook.svg" alt="" width="20" height="20" />
                Facebook
              </a>
            </div>

            <div class="register-divider" role="separator">OR</div>

            <div class="register-field">
              <label class="register-field__label" for="signin-username">Username</label>
              <div class="register-input-wrap">
                <span class="register-input-wrap__icon" aria-hidden="true">
                  <img src="assets/icons/mdi_user-outline.svg" alt="" width="20" height="20" />
                </span>
                <input
                  id="signin-username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  placeholder="John Doe"
                />
              </div>
            </div>

            <div class="register-field">
              <label class="register-field__label" for="signin-email">Email</label>
              <div class="register-input-wrap">
                <span class="register-input-wrap__icon" aria-hidden="true">
                  <img src="assets/icons/Email.svg" alt="" width="20" height="20" />
                </span>
                <input
                  id="signin-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="name@example.com"
                />
              </div>
            </div>

            <div class="register-field">
              <label class="register-field__label" for="signin-password">Password</label>
              <div class="register-input-wrap">
                <span class="register-input-wrap__icon" aria-hidden="true">
                  <img src="assets/icons/uil_lock.svg" alt="" width="20" height="20" />
                </span>
                <input
                  id="signin-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="••••••••••"
                />
              </div>
            </div>

            <button class="register-submit" type="submit">Sign in</button>
          </form>

          <p class="register-footer-note">
            Don’t have an account?
            <a href="register.html">Sign Up</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
